name: CI

on:
  pull_request:
    branches:
      - develop
      - main
      - release/**
      - rc/**
  push:
    branches:
      - develop
      - main
      - release/**
      - rc/**

permissions:
  contents: read

jobs:
  go-checks:
    name: Go checks
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Check formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          # v8 installs golangci-lint v2.x, which understands the v2 .golangci.yml
          # schema (version/formatters). latest pulls a build made with a current Go
          # toolchain, satisfying the module's go directive.
          version: latest

      - name: Run tests with coverage profile
        run: |
          go test ./... -race \
            -coverpkg=./internal/...,./cmd/... \
            -covermode=atomic \
            -coverprofile=cover.out

      - name: Upload coverage profile
        uses: actions/upload-artifact@v7
        with:
          name: coverage-profile-${{ github.run_id }}-${{ github.sha }}
          path: cover.out
          if-no-files-found: error

      - name: Enforce 100% coverage gate
        # go-test-coverage is a CI-only tool, run via `go run` so it never becomes a
        # go.mod dependency. The gate FAILS the build when total coverage on
        # ./internal/...,./cmd/... drops below the 100 threshold in .testcoverage.yml,
        # which documents the only two exclusions (the main() shim and gen_spdx.go).
        run: go run github.com/vladopajic/go-test-coverage/v2@v2.18.8 --config=.testcoverage.yml

      - name: Build
        run: go build ./...

  macos-build:
    name: macOS branch build
    runs-on: macos-15
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Build binary
        run: go build -o license-tool ./cmd/license-tool

      - name: Upload branch binary
        uses: actions/upload-artifact@v7
        with:
          name: license-tool-${{ github.run_id }}-${{ github.sha }}-macos
          path: license-tool
          if-no-files-found: error

  windows-build:
    name: Windows branch build
    runs-on: windows-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Build binary
        run: go build -o license-tool.exe ./cmd/license-tool

      - name: Upload branch binary
        uses: actions/upload-artifact@v7
        with:
          name: license-tool-${{ github.run_id }}-${{ github.sha }}-windows
          path: license-tool.exe
          if-no-files-found: error
